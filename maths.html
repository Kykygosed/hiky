<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Entraînement Thalès - Brevet</title>

<style>
body{
font-family: Arial;
background:#f4f6f8;
margin:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:150px;
margin-top:10px;
padding:10px;
font-size:14px;
}

button{
margin-top:15px;
padding:10px 20px;
font-size:16px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#3d8f40;
}

.result{
margin-top:20px;
background:#eef6ff;
padding:15px;
border-radius:6px;
}

.exercise{
background:#f8f8f8;
padding:15px;
border-radius:6px;
margin-bottom:20px;
}

#triangleCanvas{
margin-top:20px;
border:1px solid #ccc;
background:#fff;
display:block;
}
</style>
</head>

<body>

<div class="container">

<h1>Exercice de Thalès (type brevet)</h1>

<div class="exercise" id="exercise"></div>

<canvas id="triangleCanvas" width="400" height="300"></canvas>

<h3>Rédaction :</h3>
<textarea id="redac" placeholder="Écris ta rédaction complète ici..."></textarea>

<h3>Notes / Calculs :</h3>
<textarea id="notes" placeholder="Tes brouillons ou calculs..."></textarea>

<button onclick="evaluate()">Corriger avec l'IA</button>

<div class="result" id="result"></div>

</div>

<canvas id="triangleCanvas" width="400" height="300"></canvas>

<script>
let canvas = document.getElementById("triangleCanvas");
let ctx = canvas.getContext("2d");

let AD, AB, AC, AE;

function generateExercise() {
    AD = Math.floor(Math.random()*5)+2;
    AB = AD*3;
    AC = Math.floor(Math.random()*10)+10;

    document.getElementById("exercise").innerHTML =
    `
    Dans le triangle ABC :

    A, D, B sont alignés  
    A, E, C sont alignés  

    (DE) est parallèle à (BC)

    AD = ${AD} cm  
    AB = ${AB} cm  
    AC = ${AC} cm  

    Calculer AE.

    Rédige la démonstration avec le théorème de Thalès.
    `;

    drawTriangle();
}

function drawTriangle(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let margin = 50;
    let scale = 10;

    // Points de base sur le canvas
    let Ax = margin;
    let Ay = canvas.height - margin;
    let Bx = Ax + AB*scale;
    let By = Ay;
    let Cx = Ax + AC*scale/2;
    let Cy = Ay - AC*scale;

    // D sur AB
    let Dx = Ax + AD*scale;
    let Dy = Ay;

    // Calcul AE selon Thalès (AE/AC = AD/AB)
    AE = (AD / AB) * AC;

    // E sur AC
    let Ex = Ax + (Cx - Ax)*(AE/AC);
    let Ey = Ay + (Cy - Ay)*(AE/AC);

    // Dessin triangle ABC
    ctx.beginPath();
    ctx.moveTo(Ax, Ay);
    ctx.lineTo(Bx, By);
    ctx.lineTo(Cx, Cy);
    ctx.closePath();
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Dessin DE parallèle à BC
    ctx.beginPath();
    ctx.moveTo(Dx, Dy);
    ctx.lineTo(Ex, Ey);
    ctx.strokeStyle = "red";
    ctx.setLineDash([5,5]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Dessin des points
    drawPoint(Ax, Ay, "A");
    drawPoint(Bx, By, "B");
    drawPoint(Cx, Cy, "C");
    drawPoint(Dx, Dy, "D");
    drawPoint(Ex, Ey, "E");
}

function drawPoint(x, y, label) {
    ctx.fillStyle = "#007bff";
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, 2*Math.PI);
    ctx.fill();
    ctx.fillStyle = "#000";
    ctx.font = "14px Arial";
    ctx.fillText(label, x + 7, y - 7);
}

generateExercise();
</script>
</body>
</html>
